<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Explorer Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>
<body class="theme-forest">
    <canvas id="confetti-canvas"></canvas>

    <div id="game-container">
        <div class="theme-selector">
            <button class="theme-btn" data-theme="forest" style="background: #4caf50; color: #fff;">Forest</button>
            <button class="theme-btn" data-theme="space" style="background: #9c27b0; color: #fff;">Space</button>
            <button class="theme-btn" data-theme="candy" style="background: #ff4081; color: #fff;">Candy</button>
        </div>

        <div id="progress-wrapper">
            <span id="progress-label">Progress</span>
            <div id="progress-container">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div id="combo-badge">Combo x2!</div>

        <div id="stats">
            <span id="score-text">Score: 0</span>
            <span class="boss-text">⚠️ BOSS LEVEL ⚠️</span>
            <span id="level-indicator">Level: 1/15</span>
        </div>
        
        <h1 id="instruction">What comes next?</h1>
        
        <div id="pattern-display"></div>
        <div id="choices-container"></div>
        <div id="feedback-message"></div>

        <div id="end-screen">
            <h1 style="font-size: 3.5rem; margin: 0;">🌟 VICTORY 🌟</h1>
            <p style="font-size: 1.6rem; opacity: 0.8;">You're a pattern master!</p>
            <h2 id="final-score" style="font-size: 2.5rem; color: var(--secondary);">Final Score: 0</h2>
            <button class="restart-btn">Play Again</button>
        </div>
    </div>

    <footer id="game-footer">
        Pattern Explorer Pro | v1.2.0
    </footer>
</body>
</html>
